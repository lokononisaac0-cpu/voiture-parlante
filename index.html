<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#FFFFFF">
<title>VISION — Assistant de bord</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
  :root {
    --route: #2563EB;
    --arrivee: #E8453C;
    --encre: #1B2430;
    --gris: #5F6B7A;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body { height:100%; }
  body {
    font-family: "Manrope", system-ui, sans-serif;
    color: var(--encre);
    overflow: hidden;
    background:#EAEDF1;
  }

  /* ---------- LA VRAIE CARTE ---------- */
  #map { position: fixed; inset: 0; z-index: 1; }
  .leaflet-tile { filter: saturate(1.22) contrast(1.06) brightness(1.02); }

  /* Marqueur taxi */
  .marqueurTaxi {
    width: 46px; height: 46px;
    display: flex; align-items: center; justify-content: center;
    filter: drop-shadow(0 4px 7px rgba(0,0,0,.45));
  }

  /* ---------- CHIP DU HAUT ---------- */
  .chipHaut {
    position: fixed; top: 14px; left: 50%;
    transform: translateX(-50%);
    background: #fff;
    border-radius: 999px;
    padding: 10px 18px;
    box-shadow: 0 2px 12px rgba(27,36,48,.2);
    font-weight: 800; font-size: 15px;
    display: flex; align-items: center; gap: 8px;
    z-index: 10;
    white-space: nowrap;
  }
  .chipHaut .pt { width:10px; height:10px; border-radius:50%; background:#B7C1CC; }
  .chipHaut .pt.on { background:#22B573; animation: pulsePt 1.6s infinite; }
  @keyframes pulsePt {
    0%,100% { box-shadow: 0 0 0 0 rgba(34,181,115,.45); }
    50%     { box-shadow: 0 0 0 6px rgba(34,181,115,0); }
  }
  .chipHaut #vitesse { color: var(--gris); font-weight: 700; font-size: 13px; }

  /* ---------- CHIP TEMPS ---------- */
  #chipTemps {
    position: fixed; top: 64px; left: 50%;
    transform: translateX(-50%);
    background: var(--route); color: #fff;
    border-radius: 12px; padding: 7px 14px;
    font-weight: 800; font-size: 14px;
    box-shadow: 0 3px 10px rgba(37,99,235,.35);
    z-index: 10; text-align: center;
    transition: background .3s;
    white-space: nowrap;
  }
  #chipTemps.fin { background: var(--arrivee); }
  #chipTemps small { display:block; font-weight:500; font-size:11px; opacity:.9; }

  /* ---------- PANNEAU BAS ---------- */
  .panneau {
    position: fixed; left: 0; right: 0; bottom: 0;
    background: #fff;
    border-radius: 24px 24px 0 0;
    box-shadow: 0 -6px 30px rgba(27,36,48,.18);
    padding: 10px 18px calc(18px + env(safe-area-inset-bottom));
    z-index: 15;
    max-width: 480px; margin: 0 auto;
    transform: translateY(115%);
    transition: transform .3s ease;
  }
  .panneau.ouvert { transform: translateY(0); }

  /* ---------- BOUTON MENU ---------- */
  #btnMenu {
    position: fixed;
    left: 16px;
    bottom: 16px;
    width: 64px; height: 64px;
    border-radius: 50%;
    background: #0F172A;
    border: none;
    box-shadow: 0 6px 18px rgba(15,23,42,.4);
    cursor: pointer;
    z-index: 16;
    padding: 0;
    display: flex; align-items: center; justify-content: center;
    transition: transform .1s;
  }
  #btnMenu:active { transform: scale(.92); }
  .poignee { width: 44px; height: 5px; border-radius: 3px; background: #E1E6EC; margin: 2px auto 12px; }
  #statut { font-size: 17px; font-weight: 800; }
  #sousStatut { font-size: 13px; color: var(--gris); margin-top: 2px; min-height: 18px; }
  .boutons { margin-top: 14px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  button {
    border: none; border-radius: 14px;
    padding: 15px 12px;
    font-family: inherit; font-size: 15px; font-weight: 800;
    cursor: pointer; transition: transform .06s;
  }
  button:active { transform: scale(.97); }
  #btnAuto {
    grid-column: 1 / -1;
    background: var(--route); color: #fff;
    box-shadow: 0 4px 14px rgba(37,99,235,.35);
  }
  #btnAuto.stop { background: var(--arrivee); box-shadow: 0 4px 14px rgba(232,69,60,.3); }
  #btnBye { background: #EEF2F7; color: var(--encre); }
  #btnManuel { background: #EEF2F7; color: var(--gris); font-weight: 700; }


  /* ---------- BOUTON MICRO IA (flottant) ---------- */
  #btnMicIA {
    position: fixed;
    right: 16px;
    bottom: 220px;
    width: 64px; height: 64px;
    border-radius: 50%;
    background: linear-gradient(135deg, #2563EB, #1D4ED8);
    border: none;
    box-shadow: 0 6px 18px rgba(37,99,235,.45);
    cursor: pointer;
    z-index: 10;
    transition: transform .1s, background .3s;
    padding: 0;
    display: flex; align-items: center; justify-content: center;
  }
  #btnMicIA:active { transform: scale(.92); }
  #btnMicIA.ecoute {
    background: linear-gradient(135deg, #E8453C, #C93A32);
    box-shadow: 0 6px 18px rgba(232,69,60,.45);
    animation: pulseMic 1.2s infinite;
  }
  @keyframes pulseMic {
    0%,100% { box-shadow: 0 0 0 0 rgba(37,99,235,.4); }
    50%     { box-shadow: 0 0 0 14px rgba(37,99,235,0); }
  }


  /* ---------- BOUTON VIDEO + LECTEUR ---------- */
  #btnVideo {
    position: fixed;
    right: 16px;
    bottom: 296px;
    width: 64px; height: 64px;
    border-radius: 50%;
    background: #fff;
    border: none;
    box-shadow: 0 4px 16px rgba(27,36,48,.25);
    cursor: pointer;
    z-index: 10;
    padding: 0;
    transition: transform .1s;
    display: flex; align-items: center; justify-content: center;
  }
  #btnVideo:active { transform: scale(.92); }

  #panneauVideo {
    position: fixed;
    right: 12px;
    bottom: 16px;
    width: min(360px, calc(100vw - 24px));
    background: #fff;
    border-radius: 18px;
    box-shadow: 0 10px 40px rgba(27,36,48,.35);
    z-index: 20;
    padding: 12px;
    opacity: 0;
    transform: translateY(26px);
    pointer-events: none;
    transition: transform .3s ease, opacity .3s ease;
  }
  #panneauVideo.ouvert {
    opacity: 1;
    transform: translateY(0);
    pointer-events: auto;
  }
  .fermerFlottant {
    position: absolute;
    top: 4px; right: 4px;
    width: 32px; height: 32px;
    border-radius: 50%;
    border: none;
    background: rgba(15,23,42,.85);
    color: #fff;
    font-size: 15px; font-weight: 800;
    cursor: pointer; padding: 0;
    z-index: 2;
  }
  .videoHaut {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 10px;
  }
  .videoHaut b { font-size: 15px; }
  #fermerVideo {
    width: 34px; height: 34px; border-radius: 50%;
    border: none; background: #EEF2F7; color: var(--encre);
    font-size: 16px; font-weight: 800; cursor: pointer; padding: 0;
  }
  .cadreVideo {
    position: relative; width: 100%;
    aspect-ratio: 16 / 9;
    border-radius: 12px; overflow: hidden;
    background: #000;
  }
  .cadreVideo.pageWeb {
    aspect-ratio: auto;
    height: min(440px, 58vh);
    background: #fff;
  }
  .cadreVideo iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: 0; }
  .chipsVideo { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
  .chipsVideo button {
    border: none; border-radius: 999px;
    background: #EEF2F7; color: var(--encre);
    font-family: inherit; font-size: 12.5px; font-weight: 700;
    padding: 8px 12px; cursor: pointer;
  }
  .chipsVideo button.actifV { background: var(--route); color: #fff; }


  /* ---------- BOUTON PLAN / SATELLITE ---------- */
  #btnCouche {
    position: fixed;
    left: 16px;
    bottom: 220px;
    width: 64px; height: 64px;
    border-radius: 16px;
    border: 3px solid #fff;
    box-shadow: 0 4px 16px rgba(27,36,48,.3);
    cursor: pointer;
    z-index: 10;
    padding: 0;
    overflow: hidden;
    background-size: cover;
    background-position: center;
    transition: transform .1s;
  }
  #btnCouche:active { transform: scale(.94); }
  #btnCouche span {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    background: rgba(27,36,48,.72);
    color: #fff;
    font-family: inherit;
    font-size: 10px;
    font-weight: 800;
    padding: 3px 0;
  }

  /* ---------- ECRAN-BOUTON (toucher n'importe ou pour ouvrir) ---------- */
  #toucheOuvrir {
    position: fixed; inset: 0;
    background: rgba(10, 18, 33, .82);
    z-index: 30;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    cursor: pointer;
    color: #fff;
  }
  #toucheOuvrir.ouvert { display: flex; }
  #toucheOuvrir .toEmoji { font-size: 74px; animation: pulseTouche 1.2s infinite; }
  #toucheOuvrir .toTitre { font-size: 22px; font-weight: 800; margin-top: 14px; }
  #toucheOuvrir .toSous { font-size: 14px; color: #B8C8E0; margin-top: 6px; }
  @keyframes pulseTouche {
    0%,100% { transform: scale(1); }
    50%     { transform: scale(1.12); }
  }

  /* ---------- TOAST VERSET (haut droite, 8 secondes) ---------- */
  #notifVerset {
    position: fixed;
    top: 110px; right: 12px;
    width: min(300px, calc(100vw - 24px));
    background: #FFFDF4;
    border: 1px solid #E8D284;
    border-left: 5px solid #C9A227;
    border-radius: 14px;
    box-shadow: 0 8px 26px rgba(27,36,48,.22);
    padding: 12px 14px;
    z-index: 13;
    transform: translateX(115%);
    opacity: 0;
    transition: transform .45s cubic-bezier(.2,.8,.2,1), opacity .4s;
    pointer-events: none;
  }
  #notifVerset.ouvert { transform: translateX(0); opacity: 1; }
  #notifVerset .vTexte {
    font-size: 12.5px; font-style: italic; color: #4A3F1E; line-height: 1.45;
  }
  #notifVerset .vRef {
    font-size: 11.5px; font-weight: 800; color: #C9A227;
    margin-top: 5px; text-align: right;
  }

  /* ---------- CARTE D'INFORMATION (resultats jolis) ---------- */
  #infoCarte {
    position: fixed;
    background: #fff;
    border-radius: 18px;
    box-shadow: 0 10px 40px rgba(27,36,48,.3);
    padding: 14px;
    z-index: 12;
    opacity: 0;
    pointer-events: none;
    transition: transform .5s cubic-bezier(.2,.8,.2,1), opacity .4s ease;
  }
  #infoCarte.ouvert { opacity: 1; pointer-events: auto; }

  /* Descend du haut et s'arrete au milieu */
  #infoCarte.style-haut, #infoCarte.style-bas, #infoCarte.style-centre {
    top: 50%; left: 50%;
    width: min(380px, calc(100vw - 24px));
    max-height: 62vh; overflow-y: auto;
  }
  #infoCarte.style-haut { transform: translate(-50%, -95vh); }
  #infoCarte.style-haut.ouvert { transform: translate(-50%, -50%); }

  /* Monte du bas et s'arrete au milieu */
  #infoCarte.style-bas { transform: translate(-50%, 60vh); }
  #infoCarte.style-bas.ouvert { transform: translate(-50%, -50%); }

  /* Au centre avec effet zoom (jeux, scores) */
  #infoCarte.style-centre { transform: translate(-50%, -50%) scale(.6); }
  #infoCarte.style-centre.ouvert { transform: translate(-50%, -50%) scale(1); }

  /* Petit cadre discret, comme la video */
  #infoCarte.style-pip {
    left: 12px; bottom: 92px;
    width: 235px; padding: 10px;
    transform: translateY(26px);
  }
  #infoCarte.style-pip.ouvert { transform: translateY(0); }
  #infoCarte.style-pip .infoTexte { font-size: 12px; }
  #infoCarte.style-pip .infoGrand { font-size: 24px; }
  #infoCarte.style-pip .infoEmoji { font-size: 26px; }
  #infoCarte.style-pip .infoTitre { font-size: 14px; }
  .infoLigneTitre { display: flex; gap: 10px; align-items: center; margin-bottom: 6px; padding-right: 30px; }
  .infoEmoji { font-size: 34px; line-height: 1; }
  .infoTitre { font-weight: 800; font-size: 16px; }
  .infoTexte { font-size: 13.5px; color: #3A4657; line-height: 1.5; }
  .infoImage { width: 100%; border-radius: 12px; margin-bottom: 8px; max-height: 170px; object-fit: cover; display: block; }
  .infoGrand { font-size: 30px; font-weight: 800; }
  .infoListe { margin: 0; padding-left: 18px; font-size: 13.5px; color: #3A4657; }
  .infoListe li { margin: 6px 0; }

  @media (prefers-reduced-motion: reduce) { .chipHaut .pt.on { animation: none; } }
</style>
</head>
<body>

<div id="map"></div>

<div class="chipHaut"><span class="pt" id="ptEtat"></span> VISION <span id="micBadge" style="display:none">🎙️</span> <span id="vitesse"></span></div>
<div id="chipTemps">— <small>en attente</small></div>

<button id="btnCouche" title="Changer de vue"><span>Satellite</span></button>

<button id="btnVideo" title="Vidéos"><svg viewBox="0 0 24 24" width="27" height="27" fill="none" stroke="#1B2430" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="2" y="5" width="20" height="14" rx="3"/><polygon points="10 9 15 12 10 15" fill="#1B2430" stroke="none"/></svg></button>

<div id="toucheOuvrir"></div>

<div id="notifVerset"></div>

<div id="infoCarte"></div>

<div id="panneauVideo">
  <button id="fermerVideo" class="fermerFlottant">✕</button>
  <div class="cadreVideo"><iframe id="iframeVideo" src="" allow="autoplay; encrypted-media; fullscreen" allowfullscreen title="Video"></iframe></div>
</div>

<button id="btnMicIA" title="Parler à VISION"><svg viewBox="0 0 24 24" width="27" height="27" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg></button>

<button id="btnMenu" title="Menu"><svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="#fff" stroke-width="2.4" stroke-linecap="round" aria-hidden="true"><line x1="4" y1="7" x2="20" y2="7"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="17" x2="20" y2="17"/></svg></button>

<div class="panneau">
  <div class="poignee"></div>
  <div id="statut">Assistant de bord</div>
  <div id="sousStatut">Appuie sur Démarrer VISION, puis Accueillir à chaque client.</div>
  <div class="boutons">
    <button id="btnAuto">▶️ Démarrer VISION</button>
    <button id="btnBye">👋 Fin de course</button>
    <button id="btnManuel">🙋 Accueillir le client</button>
  </div>
  <label style="display:block;font-size:12.5px;color:var(--gris);font-weight:700;margin:14px 2px 5px">
    📱 WhatsApp du chauffeur (reste uniquement sur ce téléphone)
  </label>
  <input type="tel" id="numWhatsapp" placeholder="Ex : 22997000000"
    style="width:100%;padding:13px;border-radius:12px;border:1.5px solid #DDE3EA;font-family:inherit;font-size:14.5px;font-weight:700">
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ============ LES 3 MESSAGES (modifie librement les textes) ============

const MSG_ACCUEIL =
  "{salutation} ! Bienvenue à bord. Je suis VISION, votre assistant personnel pour ce trajet. " +
  "Asseyez-vous confortablement, et n'oubliez pas d'attacher votre ceinture de sécurité. " +
  "Que Dieu bénisse votre trajet !";

const MSG_MI_TRAJET =
  "J'espère que votre trajet se passe bien. " +
  "Petit rappel : veillez à ne pas oublier vos affaires en descendant. " +
  "Je vous souhaite une excellente fin de trajet !";

const MSG_AUREVOIR =
  "Nous voilà arrivés ! Vérifiez que vous n'oubliez rien : téléphone, sac, portefeuille. " +
  "Merci d'avoir voyagé avec nous, et que Dieu vous garde !";

// Réglages
const DELAI_DEMARRAGE_SEC = 3;
const DELAI_MI_TRAJET_MIN = 5;
const PAUSE_ENTRE_CLIENTS_SEC = 90;
const TON_VOIX = 0.55;
const VITESSE_VOIX = 0.88;

// ============ ÉLÉMENTS ============
const $ = id => document.getElementById(id);
const statut = $("statut"), sousStatut = $("sousStatut");
const chipTemps = $("chipTemps"), ptEtat = $("ptEtat"), vitesseEl = $("vitesse");

let timerMi = null, timerDemarrage = null;
let voixChoisie = null;
let auto = false, enCourse = false, miDit = false;
let dernierAccueil = 0, finMiPrevue = 0;
let wakeLock = null, watchGPS = null;
let dernierePos = null;
let derniereAlerteVitesse = 0;

function afficher(principal, sous) {
  statut.textContent = principal;
  sousStatut.textContent = sous || "";
}

// ============ LA VRAIE CARTE (OpenStreetMap) ============
const map = L.map("map", { zoomControl: false }).setView([6.3703, 2.3912], 14); // Cotonou

// --- Les deux mondes : Plan epure + Satellite ---
const fondPlan = L.tileLayer("https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png", {
  maxZoom: 19,
  attribution: "© OpenStreetMap © CARTO"
});
const fondSatellite = L.tileLayer("https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}", {
  maxZoom: 19,
  attribution: "© Esri"
});
// Noms des rues par-dessus le satellite (sinon on est perdu)
const etiquettes = L.tileLayer("https://{s}.basemaps.cartocdn.com/rastertiles/voyager_only_labels/{z}/{x}/{y}{r}.png", {
  maxZoom: 19, pane: "shadowPane"
});

let vueSatellite = false;
fondPlan.addTo(map);

const btnCouche = document.getElementById("btnCouche");
// Apercu de l'AUTRE vue sur le bouton (comme Google Maps)
const APERCU_SAT  = "https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/13/3948/4148";
const APERCU_PLAN = "https://a.basemaps.cartocdn.com/rastertiles/voyager/13/4148/3948.png";
btnCouche.style.backgroundImage = "url('" + APERCU_SAT + "')";

btnCouche.onclick = () => {
  vueSatellite = !vueSatellite;
  if (vueSatellite) {
    map.removeLayer(fondPlan);
    fondSatellite.addTo(map);
    etiquettes.addTo(map);
    map.setZoom(17);
    btnCouche.querySelector("span").textContent = "Plan";
    btnCouche.style.backgroundImage = "url('" + APERCU_PLAN + "')";
  } else {
    map.removeLayer(fondSatellite);
    map.removeLayer(etiquettes);
    fondPlan.addTo(map);
    map.setZoom(14);
    btnCouche.querySelector("span").textContent = "Satellite";
    btnCouche.style.backgroundImage = "url('" + APERCU_SAT + "')";
  }
};

const iconeTaxi = L.divIcon({
  className: "",
  html: '<div class="marqueurTaxi"><svg width="44" height="44" viewBox="0 0 48 48"><g><rect x="15" y="5" width="18" height="38" rx="8.5" fill="#0F172A"/><rect x="16.6" y="6.6" width="14.8" height="34.8" rx="7" fill="#1E293B"/><path d="M18.5 13.5 Q24 10.5 29.5 13.5 L29 18 Q24 16 19 18 Z" fill="#7DB4F5"/><path d="M18.8 36 Q24 38.3 29.2 36 L29 32.4 Q24 34 19 32.4 Z" fill="#7DB4F5"/><rect x="19.5" y="20.5" width="9" height="9.5" rx="2" fill="#334155"/><rect x="12.6" y="12" width="3" height="7" rx="1.5" fill="#0F172A"/><rect x="32.4" y="12" width="3" height="7" rx="1.5" fill="#0F172A"/><rect x="12.6" y="30" width="3" height="7" rx="1.5" fill="#0F172A"/><rect x="32.4" y="30" width="3" height="7" rx="1.5" fill="#0F172A"/><rect x="17.5" y="5.5" width="2.6" height="2.6" rx="1.3" fill="#F8FAFC"/><rect x="27.9" y="5.5" width="2.6" height="2.6" rx="1.3" fill="#F8FAFC"/></g></svg></div>',
  iconSize: [46, 46],
  iconAnchor: [23, 23]
});
const taxi = L.marker([6.3703, 2.3912], { icon: iconeTaxi }).addTo(map);
let traceCourse = null;
let pointsCourse = [];

// ============ LE VRAI GPS ============
function demarrerGPS() {
  if (!("geolocation" in navigator)) {
    afficher("GPS indisponible", "Ce téléphone ne donne pas sa position au navigateur.");
    return;
  }
  watchGPS = navigator.geolocation.watchPosition(pos => {
    const lat = pos.coords.latitude, lng = pos.coords.longitude;
    dernierePos = { lat: lat, lng: lng };
    taxi.setLatLng([lat, lng]);
    map.panTo([lat, lng], { animate: true });

    // Arrivee a destination (navigation en cours) ?
    if (navActive && destinationNav) {
      const d = distanceMetres(lat, lng, destinationNav.lat, destinationNav.lng);
      if (d < 80) {
        parler("Nous voila arrives a destination. " + destinationNav.nom + ".");
        effacerNavigation();
      }
    }

    // Vitesse réelle en km/h
    if (pos.coords.speed !== null && !isNaN(pos.coords.speed)) {
      const kmh = Math.round(pos.coords.speed * 3.6);
      vitesseEl.textContent = "· " + kmh + " km/h";

      // Alerte prudence : au-dela de 90 km/h, un rappel calme (max une fois toutes les 5 min)
      if (kmh > 90 && Date.now() - derniereAlerteVitesse > 300000 && !speechSynthesis.speaking) {
        derniereAlerteVitesse = Date.now();
        parler("Prudence, la vitesse est elevee. La route est longue, arrivons-y en paix.");
      }
    }

    // Trace bleue du trajet en cours
    if (enCourse) {
      pointsCourse.push([lat, lng]);
      if (!traceCourse) {
        traceCourse = L.polyline(pointsCourse, { color: "#E8453C", weight: 6, opacity: .9 }).addTo(map);
      } else {
        traceCourse.setLatLngs(pointsCourse);
      }
    }
  }, err => {
    afficher("Position refusée", "Autorise la localisation dans Chrome (icône 🔒 près de l'adresse).");
  }, { enableHighAccuracy: true, maximumAge: 2000, timeout: 15000 });
}

  if (watchGPS !== null) { navigator.geolocation.clearWatch(watchGPS); watchGPS = null; }
  vitesseEl.textContent = "";
}

// ============ VOIX ============
function traiter(texte) {
  const h = new Date().getHours();
  const salutation = (h >= 5 && h < 18) ? "Bonjour" : "Bonsoir";
  return texte.replaceAll("{salutation}", salutation);
}

let voixAnglaise = null;
let langueVocale = "fr"; // "fr" ou "en"

function chargerVoix() {
  const toutes = speechSynthesis.getVoices();
  const fr = toutes.filter(v => v.lang.toLowerCase().startsWith("fr"));
  if (fr.length) {
    voixChoisie = fr.find(v =>
      /male|homme|masculin|frb|frd|paul|nicolas|thomas|henri|claude|antoine/i.test(v.name)
      && !/female|femme/i.test(v.name)
    ) || fr[0];
  }
  const en = toutes.filter(v => v.lang.toLowerCase().startsWith("en"));
  if (en.length) {
    voixAnglaise = en.find(v => /male/i.test(v.name) && !/female/i.test(v.name)) || en[0];
  }
}
speechSynthesis.onvoiceschanged = chargerVoix;
chargerVoix();

function parler(texte) {
  if (typeof pauserVideo === "function") pauserVideo();
  const u = new SpeechSynthesisUtterance(traiter(texte));
  u.lang = (langueVocale === "en") ? "en-US" : "fr-FR";
  u.rate = VITESSE_VOIX;
  u.pitch = TON_VOIX;
  const voix = (langueVocale === "en") ? voixAnglaise : voixChoisie;
  if (voix) u.voice = voix;
  speechSynthesis.cancel();
  speechSynthesis.speak(u);
}

// ============ CONVERSATION VOCALE (invisible, tout en voix) ============
const Reco = window.SpeechRecognition || window.webkitSpeechRecognition;
let enConversation = false;
let enSequence = false; // (variable manquante : provoquait un plantage silencieux un peu partout)

let hotwordPause = false;

function ecouterUneFois() {
  return new Promise(resolve => {
    if (!Reco) { resolve(null); return; }
    // On met l'ecoute du nom en pause pour liberer le micro
    hotwordPause = true;
    try { if (ecouteNom) ecouteNom.stop(); } catch (e) {}

    const fin = t => { hotwordPause = false; resolve(t); };
    setTimeout(() => {
      const rec = new Reco();
      rec.lang = (langueVocale === "en") ? "en-US" : "fr-FR";
      rec.interimResults = false;
      rec.maxAlternatives = 1;
      let fini = false;
      rec.onresult = e => { fini = true; fin(e.results[0][0].transcript); };
      rec.onerror = () => { fini = true; fin(null); };
      rec.onend = () => { if (!fini) fin(null); };
      try { rec.start(); } catch (e) { fin(null); }
    }, 250);
  });
}

// ============ DIRE "VISION" POUR L'APPELER ============
let ecouteNom = null, ecouteNomActive = false, ecouteEnMarche = false;
let gardienEcoute = null;

function lancerEcouteNom() {
  if (!ecouteNomActive || !Reco || ecouteEnMarche) return;
  ecouteNom = new Reco();
  ecouteNom.lang = "fr-FR";
  ecouteNom.continuous = true;
  ecouteNom.interimResults = true;

  ecouteNom.onstart = () => {
    ecouteEnMarche = true;
    document.getElementById("micBadge").style.display = "inline";
  };

  ecouteNom.onresult = e => {
    try {
      if (enConversation || enSequence || hotwordPause || speechSynthesis.speaking) return;
      for (let i = e.resultIndex; i < e.results.length; i++) {
        const t = e.results[i][0].transcript.toLowerCase();
        // "vision" mais aussi les mots proches que le micro croit entendre
        if (/vision|visio|vizion|virgin/.test(t)) {
          try { ecouteNom.stop(); } catch (err) {}
          assistantVocal();
          return;
        }
      }
    } catch (err) {
      console.error("Erreur ecoute du nom:", err);
    }
  };

  ecouteNom.onerror = e => {
    if (e.error === "not-allowed") {
      afficher("Micro refuse", "Autorise le microphone (icone cadenas pres de l'adresse).");
      arreterEcouteNom();
    }
  };

  ecouteNom.onend = () => {
    ecouteEnMarche = false;
    document.getElementById("micBadge").style.display = "none";
    if (ecouteNomActive && !hotwordPause && !enConversation) {
      setTimeout(lancerEcouteNom, 300);
    }
  };

  try { ecouteNom.start(); } catch (e) { ecouteEnMarche = false; }
}

function demarrerEcouteNom() {
  if (ecouteNomActive) return;
  ecouteNomActive = true;
  lancerEcouteNom();

  // Le gardien : toutes les 8 secondes, si l'ecoute s'est endormie, on la reveille
  gardienEcoute = setInterval(() => {
    if (ecouteNomActive && !ecouteEnMarche && !hotwordPause &&
        !enConversation && !speechSynthesis.speaking) {
      lancerEcouteNom();
    }
  }, 8000);
}

function arreterEcouteNom() {
  ecouteNomActive = false;
  if (gardienEcoute) { clearInterval(gardienEcoute); gardienEcoute = null; }
  document.getElementById("micBadge").style.display = "none";
  try { if (ecouteNom) ecouteNom.stop(); } catch (e) {}
}

function parlerEtAttendre(texte) {
  if (typeof pauserVideo === "function") pauserVideo();
  return new Promise(fin => {
    const u = new SpeechSynthesisUtterance(traiter(texte));
    u.lang = (langueVocale === "en") ? "en-US" : "fr-FR";
    u.rate = VITESSE_VOIX;
    u.pitch = TON_VOIX;
    const voix = (langueVocale === "en") ? voixAnglaise : voixChoisie;
    if (voix) u.voice = voix;
    u.onend = fin;
    u.onerror = fin;
    speechSynthesis.cancel();
    speechSynthesis.speak(u);
  });
}

// ============ LE CERVEAU LOCAL DE VISION (aucun serveur) ============
function repondreLocal(phrase) {
  const p = phrase.toLowerCase();

  if (p.includes("heure") || p.includes("quel jour")) return "{heure}.";
  if (p.includes("blague") || p.includes("rire") || p.includes("drole") || p.includes("dr\u00f4le")) {
    return BLAGUES[Math.floor(Math.random() * BLAGUES.length)];
  }
  if (p.includes("verset") || p.includes("bible") || p.includes("parole")) {
    const v = VERSETS_NOTIF[Math.floor(Math.random() * VERSETS_NOTIF.length)];
    return v.t + " " + v.r + ".";
  }
  if (p.includes("sant\u00e9") || p.includes("sante") || p.includes("conseil") || p.includes("astuce")) {
    return duJour(ASTUCES_SANTE);
  }
  if (p.includes("bonjour") || p.includes("salut") || p.includes("bonsoir")) {
    return "{salutation} ! Ravi de vous accueillir a bord. Bonne route !";
  }
  if (p.includes("\u00e7a va") || p.includes("ca va") || p.includes("comment vas")) {
    return "Je vais tres bien, moteur au top ! Et vous, pret pour la route ?";
  }
  if (p.includes("qui es") || p.includes("tu es qui") || p.includes("ton nom")) {
    return "Je suis VISION, l'assistant de bord de ce vehicule. Je veille sur vos trajets !";
  }
  if (p.includes("merci")) return "Avec plaisir ! Bonne route et que Dieu vous garde.";
  if (p.includes("au revoir") || p.includes("bye") || p.includes("bient\u00f4t") || p.includes("bientot")) {
    return "Au revoir, a tres bientot ! Prudence sur la route.";
  }
  if (p.includes("ceinture")) return "La ceinture sauve des vies ! Attachez-la avant de demarrer.";

  return "Je ne connais pas encore cette question. Essayez : quelle heure il est, un verset, une astuce sante, une blague, la meteo, le taux du dollar, ou dites : emmene-moi a, suivi d'un lieu.";
}

// Traite une question et repond.
async function traiterQuestion(question) {
  if (veutAnglais(question)) {
    langueVocale = "en";
    await parlerEtAttendre("Alright! I will speak English. I can tell the time, the weather, or guide you to a place.");
    return;
  } else if (veutFrancais(question)) {
    langueVocale = "fr";
    await parlerEtAttendre("Tres bien, je reparle francais ! Comment puis-je vous aider ?");
    return;
  } else if (estDemandeWhatsapp(question)) {
    await ouvrirWhatsapp();
    return;
  } else if (chercherSitePip(question)) {
    const site = chercherSitePip(question);
    if (/ferme|arr(e|\u00ea)te|coupe|enl(e|\u00e8)ve|quitte/i.test(question)) {
      panneauVideo.classList.remove("ouvert");
      document.querySelector(".cadreVideo").classList.remove("pageWeb");
      iframeVideo.src = "";
      await parlerEtAttendre(site.nom + " est ferme.");
    } else {
      await ouvrirSitePip(site);
    }
    return;
  } else if (estParleVideo(question)) {
    await gererVideo(question);
    return;
  } else if (estDemandePriere(question)) {
    await direPriere();
    return;
  } else if (estDemandeQuiz(question)) {
    await lancerQuiz();
    return;
  } else if (estQuestionChange(question)) {
    await direChange(question);
    return;
  } else if (estQuestionCourses(question)) {
    await direCourses();
    return;
  } else if (estQuestionPosition(question)) {
    await direPosition();
    return;
  } else if (estQuestionMeteo(question)) {
    await direMeteo();
    return;
  } else if (estDemandeItineraire(question)) {
    await naviguerVers(question);
    return;
  }

  // Le cerveau local repond, et l'ecran affiche la reponse
  const reponse = repondreLocal(question);
  montrerInfo("bas",
    '<div class="infoLigneTitre"><span class="infoEmoji">\uD83E\uDD16</span>' +
    '<div class="infoTitre">VISION</div></div>' +
    '<div class="infoTexte">' + texteSur(traiter(reponse)) + '</div>');
  await parlerEtAttendre(reponse);
}

  if (enConversation) return;

    return;

  enConversation = true;

// ============ COMPRENDRE OUI / NON ============
function estOui(t) {
  const p = (t || "").toLowerCase();
  return /\b(oui|ouais|d'accord|daccord|ok|bien sur|bien s\u00fbr|vas-y|vas y|volontiers|avec plaisir|je veux|pourquoi pas|allez|mets|montre)\b/.test(p);
}
function estNon(t) {
  const p = (t || "").toLowerCase();
  return /\b(non|nan|pas besoin|ca va|\u00e7a va|merci non|non merci|plus tard|jamais|laisse)\b/.test(p);
}

// ============ NAVIGATION REELLE (adresses + itineraire trace) ============
// Services libres : Nominatim (trouver l'adresse) + OSRM (calculer la route)
let navActive = false, destinationNav = null, infoNav = null;
let routeNav = null, marqueurDest = null;

function distanceMetres(lat1, lng1, lat2, lng2) {
  const R = 6371000, rad = Math.PI / 180;
  const dLat = (lat2 - lat1) * rad, dLng = (lng2 - lng1) * rad;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*rad) * Math.cos(lat2*rad) * Math.sin(dLng/2)**2;
  return 2 * R * Math.asin(Math.sqrt(a));
}

function effacerNavigation() {
  navActive = false; destinationNav = null; infoNav = null;
  if (routeNav) { map.removeLayer(routeNav); routeNav = null; }
  if (marqueurDest) { map.removeLayer(marqueurDest); marqueurDest = null; }
}

async function obtenirMeteo() {
  const pos = dernierePos || { lat: 6.3703, lng: 2.3912 }; // Cotonou par defaut
  const rep = await fetch("https://api.open-meteo.com/v1/forecast?latitude=" + pos.lat +
    "&longitude=" + pos.lng + "&current=temperature_2m,weather_code,wind_speed_10m&timezone=auto");
  const data = await rep.json();
  const c = data.current;
  return {
    temp: Math.round(c.temperature_2m),
    vent: Math.round(c.wind_speed_10m),
    desc: TEMPS_METEO[c.weather_code] || "temps variable",
    emoji: EMOJI_METEO[c.weather_code] || "\uD83C\uDF24\uFE0F"
  };
}

function afficherCarteMeteo(mto) {
  montrerInfo("pip",
    '<div class="infoLigneTitre"><span class="infoEmoji">' + mto.emoji + '</span>' +
    '<div><div class="infoGrand">' + mto.temp + '\u00B0C</div>' +
    '<div class="infoTitre">' + mto.desc.charAt(0).toUpperCase() + mto.desc.slice(1) + '</div></div></div>' +
    '<div class="infoTexte">\uD83D\uDCA8 Vent : ' + mto.vent + ' km/h \u00B7 \uD83D\uDCCD Position actuelle</div>');
}

// Quand ON LUI DEMANDE : elle montre ET elle parle
async function direMeteo() {
  try {
    const mto = await obtenirMeteo();
    afficherCarteMeteo(mto);
    await parlerEtAttendre("En ce moment, il fait " + mto.temp +
      " degres, avec un " + mto.desc + ", et un vent d'environ " + mto.vent +
      " kilometres heure.");
  } catch (e) {
    await parlerEtAttendre("Je n'arrive pas a joindre le service meteo pour le moment.");
  }
}

let timerNotif = null;

function programmerNotif(ms) {
  clearTimeout(timerNotif);
  timerNotif = setTimeout(notifSilencieuse, ms);
}

async function notifSilencieuse() {
  if (!auto) return; // seulement quand VISION est en marche
  // Jamais pendant qu'elle parle ou ecoute : on repousse
  if (speechSynthesis.speaking || enConversation || enSequence ||
      notifVerset.classList.contains("ouvert")) {
    programmerNotif(30000);
    return;
  }
  try {
    const mto = await obtenirMeteo();
    afficherCarteMeteo(mto); // affichage seulement, pas un mot
  } catch (e) {}
  programmerNotif(10 * 60000); // prochaine notification dans 10 minutes
}

const infoCarte = document.getElementById("infoCarte");

function montrerInfo(style, contenu) {
  if (typeof notifVerset !== "undefined" && notifVerset) notifVerset.classList.remove("ouvert");

  infoCarte.className = "style-" + (style || "haut");

  timerInfo = setTimeout(cacherInfo, 45000); // se range toute seule apres 45 s
}

function cacherInfo() {
  infoCarte.classList.remove("ouvert");
}

let timerVerset = null, timerVersetCache = null, dernierVersetIdx = -1;
const notifVerset = document.getElementById("notifVerset");

function afficherVersetNotif() {
  if (!auto) return;
  // JAMAIS deux notifications en meme temps (la video ne compte pas)
  if (speechSynthesis.speaking || enConversation || enSequence) return;
  if (infoCarte.classList.contains("ouvert")) return;

  let i;
  do { i = Math.floor(Math.random() * VERSETS_NOTIF.length); }
  while (i === dernierVersetIdx && VERSETS_NOTIF.length > 1);
  dernierVersetIdx = i;

  const v = VERSETS_NOTIF[i];
  notifVerset.innerHTML =
    '<div class="vTexte">\uD83D\uDCD6 \u00AB ' + v.t + ' \u00BB</div>' +
    '<div class="vRef">' + v.r + '</div>';
  notifVerset.classList.add("ouvert");

  clearTimeout(timerVersetCache);
  timerVersetCache = setTimeout(() => notifVerset.classList.remove("ouvert"), 8000);
}

function demarrerVersets() {
  clearInterval(timerVerset);
  timerVerset = setInterval(afficherVersetNotif, 60000); // un verset par minute
  setTimeout(afficherVersetNotif, 25000); // le premier peu apres le demarrage
}

function arreterVersets() {
  clearInterval(timerVerset);
  clearTimeout(timerVersetCache);
  notifVerset.classList.remove("ouvert");
}

// ============ TAUX DE CHANGE (gratuit, sans cle) ============
function estQuestionChange(p) {
  return /taux de change|combien vaut|le dollar|l euro|l'euro|le naira|le cedi|livre sterling|le yuan|cours du/i.test(p);
}

async function direChange(question) {
  const q = question.toLowerCase();
  let code = "USD", nom = "un dollar americain";
  if (q.includes("euro")) { code = "EUR"; nom = "un euro"; }
  else if (q.includes("naira")) { code = "NGN"; nom = "un naira nigerian"; }
  else if (q.includes("cedi")) { code = "GHS"; nom = "un cedi ghaneen"; }
  else if (q.includes("livre")) { code = "GBP"; nom = "une livre sterling"; }
  else if (q.includes("yuan")) { code = "CNY"; nom = "un yuan chinois"; }
  try {
    const rep = await fetch("https://open.er-api.com/v6/latest/" + code);
    const data = await rep.json();
    if (data.rates && data.rates.XOF) {
      const taux = Math.round(data.rates.XOF);
      const DRAPEAUX = { USD:"\uD83C\uDDFA\uD83C\uDDF8", EUR:"\uD83C\uDDEA\uD83C\uDDFA", NGN:"\uD83C\uDDF3\uD83C\uDDEC", GHS:"\uD83C\uDDEC\uD83C\uDDED", GBP:"\uD83C\uDDEC\uD83C\uDDE7", CNY:"\uD83C\uDDE8\uD83C\uDDF3" };
      montrerInfo("pip",
        '<div class="infoLigneTitre"><span class="infoEmoji">' + (DRAPEAUX[code] || "\uD83D\uDCB1") + '</span>' +
        '<div><div class="infoGrand">1 ' + code + ' = ' + taux.toLocaleString("fr-FR") + ' FCFA</div>' +
        '<div class="infoTexte">Taux du jour \u00B7 mis a jour aujourd\u0027hui</div></div></div>');
      await parlerEtAttendre("Aujourd'hui, " + nom + " vaut environ " +
        Math.round(data.rates.XOF) + " francs CFA.");
    } else {
      await parlerEtAttendre("Je n'ai pas ce taux de change pour le moment.");
    }
  } catch (e) {
    await parlerEtAttendre("Je n'arrive pas a joindre le service de change.");
  }
}

const QUIZ = [
  { q: "Quelle est la capitale officielle du Benin ?", mots: ["porto"], bonne: "Porto-Novo" },
  { q: "Qui a vaincu Goliath dans la Bible ?", mots: ["david"], bonne: "David" },

];

function estDemandeQuiz(p) {
  return /quiz|un jeu|devinette|pose[- ]moi (une|des) question/i.test(p);
}

async function lancerQuiz() {
  const questions = [...QUIZ].sort(() => Math.random() - 0.5).slice(0, 3);
  let score = 0;
  await parlerEtAttendre("Tres bien, petit quiz en trois questions ! C'est parti.");
  for (let i = 0; i < questions.length; i++) {
    const item = questions[i];
    await parlerEtAttendre("Question " + (i + 1) + " : " + item.q);
    const rep = await ecouterUneFois();
    const bon = rep && item.mots.some(m => rep.toLowerCase().includes(m));
    if (bon) {
      score++;
      await parlerEtAttendre("Bravo, bonne reponse !");
    } else {
      await parlerEtAttendre("Ce n'est pas ca. La bonne reponse etait : " + item.bonne + ".");
    }
  }
  const fin = score === 3 ? "Felicitations, champion !" : (score >= 1 ? "Pas mal du tout !" : "On se rattrapera au prochain trajet !");
  montrerInfo("centre",
    '<div class="infoLigneTitre"><span class="infoEmoji">' + (score === 3 ? "\uD83C\uDFC6" : "\uD83C\uDFAF") + '</span>' +
    '<div><div class="infoGrand">' + score + ' / 3</div>' +
    '<div class="infoTitre">' + fin + '</div></div></div>');
  await parlerEtAttendre("Score final : " + score + " sur 3. " + fin);
}

function estParleVideo(p) {

function jouerVideo() {
  if (iframeVideo.src) {

  }

async function gererVideo(q) {
  const p = q.toLowerCase();
  if (/arr(e|\u00ea)te|ferme|stoppe|coupe|enl(e|\u00e8)ve|(e|\u00e9)teins/.test(p)) {
    panneauVideo.classList.remove("ouvert");
    iframeVideo.src = "";
    videoActive = -1;
    await parlerEtAttendre("Video arretee.");
  } else if (/pause|attends/.test(p)) {
    pauserVideo();
    await parlerEtAttendre("Video en pause. Dites, Vision, continue la video, pour reprendre.");
  } else if (/continue|reprend|relance|remets|play/.test(p)) {
    if (videoActive === -1) { panneauVideo.classList.add("ouvert"); chargerVideo(0); }
    else { panneauVideo.classList.add("ouvert"); jouerVideo(); }
    await parlerEtAttendre("C'est reparti !");
  } else if (/change|suivant|autre/.test(p)) {
    panneauVideo.classList.add("ouvert");
    chargerVideo(videoActive === -1 ? 0 : (videoActive + 1) % VIDEOS.length);
    await parlerEtAttendre("Voici une autre video !");
  } else {
    panneauVideo.classList.add("ouvert");
    chargerVideo(videoActive === -1 ? 0 : videoActive);
    await parlerEtAttendre("Voici la video, bon visionnage !");
  }
}

function estQuestionPosition(p) {
  return /o(u|\u00f9) sommes[- ]nous|on est o(u|\u00f9)|nous sommes o(u|\u00f9)|notre position|ma position|o(u|\u00f9) est[- ]on|o(u|\u00f9) on est|dans quel quartier/i.test(p);

async function direPosition() {
  if (!dernierePos) {
    await parlerEtAttendre("Activez d'abord le mode automatique, pour que le GPS me donne notre position.");
    return;
  }
  try {
    const rep = await fetch("https://nominatim.openstreetmap.org/reverse?format=json&accept-language=fr&zoom=16&lat=" +
      dernierePos.lat + "&lon=" + dernierePos.lng);
    const data = await rep.json();
    const a = data.address || {};
    const rue = a.road || a.pedestrian || "";
    const quartier = a.suburb || a.neighbourhood || a.quarter || a.city_district || "";
    const ville = a.city || a.town || a.village || "";
    let phrase = "Nous sommes actuellement ";
    if (rue) phrase += "sur " + rue + ", ";
    if (quartier) phrase += "dans le quartier " + quartier + ", ";
    if (ville) phrase += "a " + ville + ".";
    if (!rue && !quartier && !ville) phrase = "Je vois notre position sur la carte, mais je n'ai pas le nom exact de cette rue.";
    else {
      montrerInfo("pip",
        '<div class="infoLigneTitre"><span class="infoEmoji">\uD83D\uDCCD</span>' +
        '<div class="infoTitre">Notre position</div></div>' +
        '<div class="infoTexte">' + (rue ? rue + "<br>" : "") + (quartier ? "Quartier " + quartier + "<br>" : "") + (ville || "") + '</div>');
    }
    await parlerEtAttendre(phrase);
  } catch (e) {
    await parlerEtAttendre("Je n'arrive pas a joindre le service de cartes pour nommer notre position.");
  }
}

// La phrase demande-t-elle un itineraire ?
function estDemandeItineraire(p) {
  return /emm(e|è)ne|am(e|è)ne|conduis|direction|itin(e|é)raire|comment aller|je veux aller|va (a|à) |allons (a|à) |o(u|ù) se trouve|o(u|ù) est|adresse de/i.test(p);
}

// Nettoie la phrase pour garder le nom du lieu
function extraireLieu(p) {
  return p.replace(/emm(e|è)ne[- ]?(moi|nous)?|am(e|è)ne[- ]?(moi|nous)?|conduis[- ]?(moi|nous)?|je veux aller|comment aller|quelle est la direction de|itin(e|é)raire (vers|pour|de)?|direction|o(u|ù) se trouve|o(u|ù) est|adresse de|va (a|à)|allons (a|à)|vers|s'il (te|vous) pla(i|î)t|stp/gi, " ")
          .replace(/\s+/g, " ").trim();
}

async function naviguerVers(phrase) {
  if (!dernierePos) {
    await parlerEtAttendre("Activez d'abord le mode automatique, pour que je connaisse notre position.");
    return;
  }
  const lieu = extraireLieu(phrase) || phrase;
  await parlerEtAttendre("Un instant, je cherche " + lieu + ".");

  try {
    // 1. Trouver le lieu (priorite au Benin)
    const rep = await fetch("https://nominatim.openstreetmap.org/search?format=json&limit=1&accept-language=fr&countrycodes=bj&q=" + encodeURIComponent(lieu));
    const resultats = await rep.json();
    if (!resultats.length) {
      await parlerEtAttendre("Desole, je ne trouve pas " + lieu + " sur la carte. Essayez avec le nom du quartier.");
      return;
    }
    const dest = { lat: parseFloat(resultats[0].lat), lng: parseFloat(resultats[0].lon),
                   nom: resultats[0].display_name.split(",")[0] };

    // 2. Calculer la route
    const repRoute = await fetch("https://router.project-osrm.org/route/v1/driving/" +
      dernierePos.lng + "," + dernierePos.lat + ";" + dest.lng + "," + dest.lat +
      "?overview=full&geometries=geojson");
    const dataRoute = await repRoute.json();
    if (!dataRoute.routes || !dataRoute.routes.length) {
      await parlerEtAttendre("Je trouve " + dest.nom + ", mais je n'arrive pas a calculer la route.");
      return;
    }
    const r = dataRoute.routes[0];
    const points = r.geometry.coordinates.map(c => [c[1], c[0]]);

    // 3. Tracer sur la carte
    effacerNavigation();
    routeNav = L.polyline(points, { color: "#2563EB", weight: 7, opacity: .9 }).addTo(map);
    marqueurDest = L.marker([dest.lat, dest.lng], {
      icon: L.divIcon({ className: "", html: '<div style="font-size:34px;line-height:34px;transform:translate(-4px,-26px)">📍</div>', iconSize: [34, 34] })
    }).addTo(map);
    map.fitBounds(routeNav.getBounds(), { padding: [60, 60] });

    const km = (r.distance / 1000).toFixed(1);
    const min = Math.round(r.duration / 60);
    navActive = true;
    destinationNav = dest;
    infoNav = { km: km, min: min, nom: dest.nom };

    await parlerEtAttendre("C'est parti pour " + dest.nom + ". " + km + " kilometres, environ " + min +
      " minutes. Suivez la ligne bleue sur l'ecran. Je vous previendrai a l'arrivee.");
  } catch (e) {
    await parlerEtAttendre("Je n'arrive pas a joindre le service de cartes. Verifiez la connexion internet.");
  }
}
