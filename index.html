<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🚗 VISION</title>
<style>
  body {
    font-family: system-ui, sans-serif;
    background: #0a1628;
    color: #eaf2ff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 30px 20px;
    text-align: center;
  }
  h1 { margin-bottom: 6px; }
  #cercle {
    width: 130px; height: 130px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 48px; margin: 14px 0;
    background: #132c52; border: 3px solid #29508c;
    transition: all .3s;
  }
  #cercle.actif { border-color: #3ddc84; box-shadow: 0 0 35px rgba(61,220,132,.35); }
  #etat {
    margin: 10px 0 16px;
    font-size: 1.05rem;
    color: #ffc84d;
    min-height: 50px;
  }
  button {
    border: none;
    border-radius: 14px;
    padding: 18px;
    font-size: 1.1rem;
    font-weight: bold;
    cursor: pointer;
    width: 100%;
    max-width: 320px;
    margin-top: 14px;
  }
  #btnAuto     { background: #3ddc84; color: #04240f; }
  #btnAuto.stop{ background: #ff5d5d; color: #fff; }
  #btnDemarrer { background: #1d3a66; color: #cfe1ff; font-weight: 500; }
  #btnBye      { background: #b58cff; color: #240d4d; }
</style>
</head>
<body>

<h1>🚗 VISION</h1>
<div>Assistant de bord</div>

<div id="cercle">🚘</div>
<div id="etat">Appuie sur « Mode automatique » et pose le téléphone.</div>

<button id="btnAuto">🤖 Mode automatique</button>
<button id="btnBye">👋 Fin de course (au revoir)</button>
<button id="btnDemarrer">🙋 Accueil manuel (si la détection rate)</button>

<script>
// ============ LES 3 MESSAGES (modifie librement les textes) ============

const MSG_ACCUEIL =
  "{salutation} ! Bienvenue à bord. Je suis VISION, votre assistant personnel pour ce trajet. " +
  "Asseyez-vous confortablement, et n'oubliez pas d'attacher votre ceinture de sécurité. " +
  "Que Dieu bénisse votre trajet !";

const MSG_MI_TRAJET =
  "J'espère que votre trajet se passe bien. " +
  "Petit rappel : veillez à ne pas oublier vos affaires en descendant. " +
  "Je vous souhaite une excellente fin de trajet !";

const MSG_AUREVOIR =
  "Nous voilà arrivés ! Vérifiez que vous n'oubliez rien : téléphone, sac, portefeuille. " +
  "Merci d'avoir voyagé avec nous, et que Dieu vous garde !";

// Réglages du temps
const DELAI_DEMARRAGE_SEC = 3;    // secondes avant la 1ère phrase
const DELAI_MI_TRAJET_MIN = 5;    // minutes avant le message de mi-trajet
const PAUSE_ENTRE_CLIENTS_SEC = 90; // temps mini avant de pouvoir accueillir le client suivant

// Réglage de la détection de mouvement
const SEUIL_DETECTION = 2.0;  // plus bas = plus sensible

// Réglages de la voix
const TON_VOIX     = 0.55;
const VITESSE_VOIX = 0.88;

// ============ LE CODE ============

const etat = document.getElementById("etat");
const cercle = document.getElementById("cercle");
let timerMi = null;
let timerDemarrage = null;
let voixChoisie = null;
let auto = false;
let enCourse = false;
let dernierAccueil = 0;
let wakeLock = null;

function traiter(texte) {
  const h = new Date().getHours();
  const salutation = (h >= 5 && h < 18) ? "Bonjour" : "Bonsoir";
  return texte.replaceAll("{salutation}", salutation);
}

function chargerVoix() {
  const francaises = speechSynthesis.getVoices().filter(v => v.lang.toLowerCase().startsWith("fr"));
  if (francaises.length === 0) return;
  voixChoisie = francaises.find(v =>
    /male|homme|masculin|frb|frd|paul|nicolas|thomas|henri|claude|antoine/i.test(v.name)
    && !/female|femme/i.test(v.name)
  ) || francaises[0];
}
speechSynthesis.onvoiceschanged = chargerVoix;
chargerVoix();

function parler(texte) {
  const u = new SpeechSynthesisUtterance(traiter(texte));
  u.lang = "fr-FR";
  u.rate = VITESSE_VOIX;
  u.pitch = TON_VOIX;
  if (voixChoisie) u.voice = voixChoisie;
  speechSynthesis.cancel();
  speechSynthesis.speak(u);
}

// ============ LA COURSE ============

function demarrerCourse() {
  if (enCourse) return;
  enCourse = true;
  dernierAccueil = Date.now();
  clearTimeout(timerDemarrage);
  clearTimeout(timerMi);

  etat.textContent = "⏳ Client détecté ! Accueil dans " + DELAI_DEMARRAGE_SEC + " secondes...";

  timerDemarrage = setTimeout(() => {
    parler(MSG_ACCUEIL);
    etat.textContent = "🚕 Trajet en cours... message de mi-trajet dans " + DELAI_MI_TRAJET_MIN + " minutes.";

    timerMi = setTimeout(() => {
      parler(MSG_MI_TRAJET);
      etat.textContent = "✅ Message de mi-trajet dit. Appuie sur 👋 à l'arrivée.";
    }, DELAI_MI_TRAJET_MIN * 60000);

  }, DELAI_DEMARRAGE_SEC * 1000);
}

document.getElementById("btnBye").onclick = () => {
  clearTimeout(timerDemarrage);
  clearTimeout(timerMi);
  parler(MSG_AUREVOIR);
  enCourse = false;
  dernierAccueil = Date.now(); // le claquement de porte ne redéclenchera pas un accueil
  etat.textContent = auto ? "👀 Prêt — j'attends le prochain client." : "👋 Course terminée.";
};

document.getElementById("btnDemarrer").onclick = () => {
  enCourse = false;
  demarrerCourse();
};

// ============ DÉTECTION AUTOMATIQUE (accéléromètre) ============

let dX = null, dY = null, dZ = null;

function surMouvement(e) {
  if (!auto || enCourse) return;
  const a = e.accelerationIncludingGravity;
  if (!a || a.x === null) return;

  if (dX !== null) {
    const delta = Math.abs(a.x - dX) + Math.abs(a.y - dY) + Math.abs(a.z - dZ);
    const pauseOk = (Date.now() - dernierAccueil) > PAUSE_ENTRE_CLIENTS_SEC * 1000;
    if (delta > SEUIL_DETECTION && pauseOk) {
      demarrerCourse();
    }
  }
  dX = a.x; dY = a.y; dZ = a.z;
}

async function garderEcran() {
  try {
    if ("wakeLock" in navigator) wakeLock = await navigator.wakeLock.request("screen");
  } catch (e) {}
}
document.addEventListener("visibilitychange", () => {
  if (auto && document.visibilityState === "visible") garderEcran();
});

document.getElementById("btnAuto").onclick = async () => {
  const btn = document.getElementById("btnAuto");
  if (!auto) {
    // iPhone demande une permission explicite
    if (typeof DeviceMotionEvent !== "undefined" &&
        typeof DeviceMotionEvent.requestPermission === "function") {
      const rep = await DeviceMotionEvent.requestPermission();
      if (rep !== "granted") { etat.textContent = "❌ Permission mouvement refusée."; return; }
    }
    window.addEventListener("devicemotion", surMouvement);
    await garderEcran();
    auto = true;
    cercle.classList.add("actif");
    cercle.textContent = "👀";
    btn.textContent = "⏹️ Arrêter le mode automatique";
    btn.classList.add("stop");
    etat.textContent = "👀 Prêt — pose le téléphone. J'accueille dès qu'un client monte.";
    parler("Système VISION activé.");
  } else {
    window.removeEventListener("devicemotion", surMouvement);
    if (wakeLock) { wakeLock.release(); wakeLock = null; }
    speechSynthesis.cancel();
    clearTimeout(timerDemarrage);
    clearTimeout(timerMi);
    auto = false;
    enCourse = false;
    cercle.classList.remove("actif");
    cercle.textContent = "🚘";
    btn.textContent = "🤖 Mode automatique";
    btn.classList.remove("stop");
    etat.textContent = "Système arrêté.";
  }
};
</script>
</body>
</html>
